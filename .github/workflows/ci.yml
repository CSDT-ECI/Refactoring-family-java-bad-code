name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build-test-analyze:
    name: Build, Test & Code Analysis
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write

    steps:
      # 1. Checkout del código (fetch-depth 0 requerido por Sonar)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Configurar Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Instalar Gradle y cachear (no requiere wrapper en el repo)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      # 4. Cache SonarCloud
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # 5. BUILD
      - name: Build
        run: gradle classes --no-daemon

      # 6. UNIT TESTS + cobertura Jacoco
      - name: Unit Tests
        run: gradle test jacocoTestReport --no-daemon || true

      # 7. Publicar reporte de tests en la pestaña Actions
      # TODO: cambiar fail_on_failure a true cuando todos los tests pasen
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'
          fail_on_failure: false

      # 8. CODE ANALYSIS con SonarCloud
      - name: Code Analysis - SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          gradle sonar --no-daemon \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=jacoco.xml

  mutation-testing:
    name: Mutation Testing (PIT)
    runs-on: ubuntu-latest
    needs: build-test-analyze
    if: always() # runs eather build had warnings
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Cache PIT dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-pitest-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-pitest-
            ${{ runner.os }}-gradle-

      - name: Compile & run tests (requerido por PIT)
        run: gradle test --no-daemon || true

      - name: Run PIT Mutation Testing
        run: gradle pitest --no-daemon || true
        # if you dont want the pipeline fail while building (starting)
        # run: gradle pitest --no-daemon || true

      - name: Upload PIT HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pitest-report-${{ github.run_number }}
          path: build/reports/pitest/
          retention-days: 15

      - name: Publish mutation score summary
        if: always()
        run: |
          XML="build/reports/pitest/mutations.xml"
          if [ ! -f "$XML" ]; then
            echo "## PIT Mutation Testing" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ No se generó el reporte XML. Revisa que existan tests en \`com.example.geektrust\`." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          TOTAL=$(grep -o '<mutation ' "$XML" | wc -l | tr -d ' ')
          KILLED=$(grep -o 'status="KILLED"' "$XML" | wc -l | tr -d ' ')
          SURVIVED=$(grep -o 'status="SURVIVED"' "$XML" | wc -l | tr -d ' ')
          NO_COV=$(grep -o 'status="NO_COVERAGE"' "$XML" | wc -l | tr -d ' ')

          if [ "$TOTAL" -gt 0 ]; then
            SCORE=$(echo "scale=1; $KILLED * 100 / $TOTAL" | bc)
          else
            SCORE="0"
          fi

          # Ícono según score
          if (( $(echo "$SCORE >= 70" | bc -l) )); then ICON="✅"
          elif (( $(echo "$SCORE >= 50" | bc -l) )); then ICON="⚠️"
          else ICON="❌"
          fi

          echo "## $ICON PIT Mutation Testing — Score: $SCORE%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resultado       | Cantidad |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total mutantes  | $TOTAL   |" >> $GITHUB_STEP_SUMMARY
          echo "| Killed ✅       | $KILLED  |" >> $GITHUB_STEP_SUMMARY
          echo "| Survived ⚠️     | $SURVIVED|" >> $GITHUB_STEP_SUMMARY
          echo "| Sin cobertura ❌| $NO_COV  |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Descarga el reporte HTML detallado en **Artifacts → pitest-report**" >> $GITHUB_STEP_SUMMARY